services:
  minio:
    image: minio/minio:latest
    container_name: ednic-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ednic_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ednic_minio_password}
    volumes:
      - ednic_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: ednic-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set ednic http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb --ignore-existing ednic/$${MINIO_PUBLIC_BUCKET};
      mc mb --ignore-existing ednic/$${MINIO_PRIVATE_BUCKET};
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ednic_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ednic_minio_password}
      MINIO_PUBLIC_BUCKET: ${MINIO_PUBLIC_BUCKET:-ednic-public}
      MINIO_PRIVATE_BUCKET: ${MINIO_PRIVATE_BUCKET:-ednic-private}

volumes:
  ednic_minio_data:
