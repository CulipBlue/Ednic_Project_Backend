        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update product category
      tags:
      - Admin Products
  /api/v1/admin/products:
    get:
      description: Returns products for admin including draft and inactive items.
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Search keyword
        in: query
        name: search
        type: string
      - description: Status
        in: query
        name: status
        type: string
      - description: Category slug
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_products.ProductListSuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List products for admin
      tags:
      - Admin Products
    post:
      consumes:
      - application/json
      description: Creates a product from admin panel.
      parameters:
      - description: Create product request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_products.CreateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_products.ProductSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create product
      tags:
      - Admin Products
  /api/v1/admin/products/{id}:
    delete:
      description: Deletes product from admin panel.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_products.MessageResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete product
      tags:
      - Admin Products
    get:
      description: Returns product detail by id for admin.
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_products.ProductSuccessResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get product for admin
      tags:
