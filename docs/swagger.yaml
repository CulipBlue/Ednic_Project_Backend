info:
  contact: {}
  description: API documentation for EDNIC backend.
  title: EDNIC Backend API
  version: 0.1.0
paths:
  /api/v1/account/password:
    patch:
      consumes:
      - application/json
      description: Changes the authenticated user's password after validating the
        current password.
      parameters:
      - description: Change password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_account.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_account.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_account.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_modules_account.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Change account password
      tags:
      - Account
  /api/v1/account/profile:
    get:
      description: Returns the authenticated user's account profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_account.ProfileSuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_modules_account.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_account.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get account profile
      tags:
      - Account
    patch:
      consumes:
      - application/json
      description: Updates the authenticated user's profile.
      parameters:
      - description: Update profile request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_account.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_account.ProfileSuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_account.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_modules_account.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_modules_account.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update account profile
      tags:
      - Account
  /api/v1/admin/health:
    get:
      description: Verifies the authenticated user has admin access.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.AdminHealthResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Admin health check
      tags:
      - Admin
  /api/v1/admin/product-categories:
    get:
      description: Returns all product categories including inactive categories.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_products.CategoryListSuccessResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List product categories for admin
      tags:
      - Admin Products
    post:
      consumes:
      - application/json
      description: Creates a product category from admin panel.
      parameters:
      - description: Create category request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_products.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_products.CategorySuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create product category
      tags:
      - Admin Products
  /api/v1/admin/product-categories/{id}:
    delete:
      description: Deletes a product category from admin panel.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_products.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete product category
      tags:
      - Admin Products
    put:
      consumes:
      - application/json
      description: Updates a product category from admin panel.
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update category request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_modules_products.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_products.CategorySuccessResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_modules_products.ErrorResponse'
        "403":
          description: Forbidden
          schema:
